    descripcion: 'Tabla del sistema COI relacionada con procesos contables/fiscales; su función específica se infiere por sus campos. Ejemplos de campos clave: CTUUIDCOMP: Numero de control para informacion de comprobantes; CTCONCIVAA: Numero de control para conceptos IVA acreditable; CTCONCIVAT: Numero de control para conceptos IVA trasladado; CCOSTOS: Numero de control para centro de costos; CTCONCEPTOS: Numero de control para conceptos; CGRUPOS: Numero de control para grupos.'
