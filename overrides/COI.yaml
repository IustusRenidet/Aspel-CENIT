    descripcion: 'Tabla del sistema COI relacionada con procesos contables/fiscales; su función específica se infiere por sus campos. Ejemplos de campos clave: TIPOIMPUESTO: Indica el tipo de impuesto (1=ISR, 2=IVA, 3=IEPS, 4= Impuesto local, 5= Otros impuestos, 6= Otras retenciones); TIPO: Indica si es impuesto trasladado  ( 1= trasladado, 0 = retenido); TIPOFACTOR: Indica si es  tasa o cuota (tasa , cuota); TASA: Tasa o cuota del impuesto; BASE: Base del impuesto; APLICAIC: Indica si el impuesto es involucrado en el calculo de Ia tabla IETU, (1= si, 0 = no).'
    modulo: Contabilidad
    tags:
      - contabilidad
  PAGO:
    descripcion: 'Vinculación de comprobantes fiscales (UUID) y terceros (RFC) con pólizas/movimientos para trazabilidad fiscal y reporteo. Ejemplos de campos clave: TIPOCADPAGO: Registra la clave del tipo de cadena de pago que genera la entidad receptora del pago.; UUIDTIMBREPAGO: id de complementos de pago; FECHAPAGO: Fecha del pago; CADPAGO: Cadena original del comprobante de pago generado por la entidad emisora de la cuenta beneficiaria; RFCEMISORCTABEN: RFC emisor de la cuenta beneficiaria; CERTPAGO: Certificado que corresponde al pago..'
    modulo: Contabilidad
    tags:
      - contabilidad
  PARAMEMP:
    descripcion: 'Catálogo del plan de cuentas (PUC): número, nombre, naturaleza, nivel y parámetros contables asociados; base para registrar movimientos y generar estados financieros. Ejemplos de campos clave: CUENTAIVATRASLADADO: Cuenta  de IIVA trasladado de la cuenta; CUENTAIVAACREDITABLE: Cuenta de IVA acreditable; GDIOTAPARTIRCFDI: Indica si la captura del diot sera a partir de CFDIs; RFCREPRE: RFC del representante  legal de la empresa; CSTIPOCMB: Indica si se captura tipo de cambio; CPTIPOCMB: Indica si se captura tipo de cambio.'
    modulo: Contabilidad
    tags:
      - contabilidad
  PLANTILLAXRFC:
    descripcion: 'Tabla del sistema COI relacionada con procesos contables/fiscales; su función específica se infiere por sus campos. Ejemplos de campos clave: RFC: RFC del tercero; USOCFDI; CLASPLANTILLA: Tipo de cfdi para el que aplica la plantilla (1=factura,2=notacredito,3=credito,4=compPago); NOMBREPLANTILLA: Nombre de la plantilla para 1a contabilizacion del UUID; NOMBREPLANTILLA2: Nombre de la plantilla para 2a contabilizacion del UUID; VERSION.'
    modulo: Contabilidad
    tags:
      - contabilidad
  POLDINAMICA:
    descripcion: 'Tabla del sistema COI relacionada con procesos contables/fiscales; su función específica se infiere por sus campos. Ejemplos de campos clave: TIPO: Tipo; CLAS_USR: Clasificacion segun el usuario; TITULO: Titulo del archivo; RUTAARCHIVO: Ruta del archivo; VERSION.'
