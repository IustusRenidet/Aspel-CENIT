    tags:
      - contabilidad
  CTAING:
    descripcion: 'Catálogo del plan de cuentas (PUC): número, nombre, naturaleza, nivel y parámetros contables asociados; base para registrar movimientos y generar estados financieros. Ejemplos de campos clave: IDCONCEPIVAT: dentificador del concepto de iva trasladado; INCLUYEIVA: Indica si incluye o no IVA; PORCENTAJEIVA: Porcentaje de IVA; PORCENTAJEISR: Porcentaje de ISR; CUENTA: Numero de cuenta; IVADEFAULT: IVA default.'
    modulo: Contabilidad
