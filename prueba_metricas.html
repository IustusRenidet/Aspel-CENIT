<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Métricas - Aspel CENIT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            padding: 20px;
            min-height: 100vh;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.8em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease-out;
            letter-spacing: -0.5px;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        
        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .tab:hover::before {
            left: 100%;
        }
        
        .tab:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
            transform: scale(1.05);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .system-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .system-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .system-card h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #667eea 0%, #764ba2 100%) 1;
            padding-bottom: 15px;
            animation: slideInLeft 0.6s ease-out;
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .metric {
            margin-bottom: 15px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 12px;
            border-left: 5px solid;
            border-image: linear-gradient(180deg, #667eea 0%, #764ba2 100%) 1;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .metric:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
        }
        
        .metric-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .metric-value {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .metric-loading {
            color: #999;
            font-style: italic;
        }
        
        .metric-error {
            color: #e74c3c;
            font-size: 0.9em;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover::after {
            width: 300px;
            height: 300px;
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .status {
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            animation: slideInRight 0.5s ease-out;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .status.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border-left: 5px solid #28a745;
        }
        
        .status.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border-left: 5px solid #dc3545;
        }
        
        .status.info {
            background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%);
            color: #0c5460;
            border-left: 5px solid #17a2b8;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .table-result {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .table-result th,
        .table-result td {
            padding: 15px;
            text-align: left;
        }
        
        .table-result th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .table-result th:first-child {
            border-top-left-radius: 12px;
        }
        
        .table-result th:last-child {
            border-top-right-radius: 12px;
        }
        
        .table-result td {
            border-bottom: 1px solid #e9ecef;
            background: white !important;
            color: #000 !important;
            transition: background 0.2s ease;
            font-size: 0.95em;
            font-weight: 400;
        }
        
        .table-result tbody {
            background: white;
        }
        
        .table-result tr:hover td {
            background: #f0f0f0 !important;
            color: #000 !important;
        }
        
        .table-result tr:last-child td:first-child {
            border-bottom-left-radius: 12px;
        }
        
        .table-result tr:last-child td:last-child {
            border-bottom-right-radius: 12px;
        }
        
        .table-result tr:last-child td {
            border-bottom: none;
        }
        
        /* Estilos para KPIs con comparativos estilo Looker Studio */
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            margin-bottom: 20px;
        }
        
        .kpi-header {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .kpi-value {
            font-size: 3em;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1;
        }
        
        .kpi-comparison {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .kpi-comparison.positive {
            color: #10b981;
        }
        
        .kpi-comparison.negative {
            color: #ef4444;
        }
        
        .kpi-arrow {
            font-size: 1.5em;
        }
        
        .kpi-subtext {
            font-size: 0.85em;
            color: #888;
            margin-left: 5px;
        }
        
        /* Tabla con porcentajes tipo breakdown */
        .breakdown-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .breakdown-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .breakdown-bar {
            height: 8px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        
        .breakdown-percentage {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Prueba de Métricas - Aspel CENIT</h1>
        
        <div class="controls">
            <button onclick="cargarMetricasSistema()" id="btnCargar">
                🔄 Cargar Todas las Métricas
            </button>
            <button onclick="limpiarResultados()">
                🗑️ Limpiar
            </button>
            <div id="status" class="status info">
                Listo para probar métricas - Selecciona un sistema
            </div>
        </div>
        
        <!-- Pestañas de sistemas -->
        <div class="tabs">
            <button class="tab active" onclick="cambiarSistema('SAE')" id="tab-sae">
                📊 SAE (39 métricas)
            </button>
            <button class="tab" onclick="cambiarSistema('COI')" id="tab-coi">
                💰 COI (23 métricas)
            </button>
            <button class="tab" onclick="cambiarSistema('NOI')" id="tab-noi">
                👥 NOI (22 métricas)
            </button>
            <button class="tab" onclick="cambiarSistema('BANCO')" id="tab-banco">
                🏦 BANCO (19 métricas)
            </button>
        </div>
        
        <!-- Contenido de SAE -->
        <div id="content-sae" class="tab-content active">
            <div class="system-card">
                <h2>📊 SAE - Sistema de Ventas (39 métricas)</h2>
                <div id="metricas-sae" class="metrics-grid"></div>
            </div>
        </div>
        
        <!-- Contenido de COI -->
        <div id="content-coi" class="tab-content">
            <div class="system-card">
                <h2>💰 COI - Contabilidad (23 métricas)</h2>
                <div id="metricas-coi" class="metrics-grid"></div>
            </div>
        </div>
        
        <!-- Contenido de NOI -->
        <div id="content-noi" class="tab-content">
            <div class="system-card">
                <h2>👥 NOI - Nómina (22 métricas)</h2>
                <div id="metricas-noi" class="metrics-grid"></div>
            </div>
        </div>
        
        <!-- Contenido de BANCO -->
        <div id="content-banco" class="tab-content">
            <div class="system-card">
                <h2>🏦 BANCO - Tesorería (19 métricas)</h2>
                <div id="metricas-banco" class="metrics-grid"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        let sistemaActual = 'SAE';
        let metricasDisponibles = {};
        
        // Cambiar pestaña de sistema
        function cambiarSistema(sistema) {
            sistemaActual = sistema;
            
            // Actualizar pestañas
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${sistema.toLowerCase()}`).classList.add('active');
            
            // Actualizar contenido
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`content-${sistema.toLowerCase()}`).classList.add('active');
            
            mostrarStatus(`Sistema ${sistema} seleccionado - Haz clic en "Cargar Todas las Métricas"`, 'info');
        }
        
        // Cargar lista de métricas disponibles desde el servidor
        async function cargarListaMetricas() {
            const sistemas = ['SAE', 'COI', 'NOI', 'BANCO'];
            
            for (const sistema of sistemas) {
                try {
                    const response = await fetch(`${API_BASE}/metricas/${sistema}`);
                    if (response.ok) {
                        const data = await response.json();
                        metricasDisponibles[sistema] = data.metricas.map(m => m.id);
                    }
                } catch (error) {
                    console.error(`Error cargando lista de ${sistema}:`, error);
                }
            }
        }
        
        async function cargarMetricasSistema() {
            const btnCargar = document.getElementById('btnCargar');
            btnCargar.disabled = true;
            btnCargar.innerHTML = '<span class="loader"></span> Cargando...';
            
            mostrarStatus(`Cargando todas las métricas de ${sistemaActual}...`, 'info');
            
            const container = document.getElementById(`metricas-${sistemaActual.toLowerCase()}`);
            container.innerHTML = '<div class="metric-loading">⏳ Cargando métricas...</div>';
            
            if (!metricasDisponibles[sistemaActual]) {
                await cargarListaMetricas();
            }
            
            const metricas = metricasDisponibles[sistemaActual] || [];
            let cargadas = 0;
            
            for (const metricaId of metricas) {
                await cargarMetrica(sistemaActual, metricaId);
                cargadas++;
                mostrarStatus(`Cargando ${sistemaActual}: ${cargadas}/${metricas.length} métricas`, 'info');
            }
            
            btnCargar.disabled = false;
            btnCargar.innerHTML = '🔄 Recargar Métricas';
            mostrarStatus(`✅ ${metricas.length} métricas de ${sistemaActual} cargadas`, 'success');
        }
        
        async function cargarMetrica(sistema, metricaId) {
            const container = document.getElementById(`metricas-${sistema.toLowerCase()}`);
            
            try {
                const response = await fetch(`${API_BASE}/metricas/${sistema}/${metricaId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Crear elemento de métrica
                const metricDiv = document.createElement('div');
                metricDiv.className = 'metric';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'metric-name';
                nameDiv.textContent = data.nombre || metricaId;
                
                const valueDiv = document.createElement('div');
                valueDiv.className = 'metric-value';
                
                // ============================================
                // RENDERIZAR KPI CON COMPARATIVO (Looker Style)
                // ============================================
                if (metricaId.includes('comparativo') || metricaId.includes('tendencia')) {
                    if (data.resultado && data.resultado.length > 0) {
                        const result = data.resultado[0];
                        
                        const kpiCard = document.createElement('div');
                        kpiCard.className = 'kpi-card';
                        
                        // Valor principal
                        const valor = result.venta_neta_actual || result.ticket_actual || 0;
                        const valorAnterior = result.venta_neta_anterior || result.ticket_anterior || 0;
                        const porcentaje = result.porcentaje_cambio || 0;
                        
                        const kpiValue = document.createElement('div');
                        kpiValue.className = 'kpi-value';
                        kpiValue.textContent = '$' + valor.toLocaleString('es-MX', {
                            minimumFractionDigits: 0,
                            maximumFractionDigits: 0
                        });
                        
                        // Comparativo
                        const kpiComparison = document.createElement('div');
                        kpiComparison.className = 'kpi-comparison ' + (porcentaje >= 0 ? 'positive' : 'negative');
                        
                        const arrow = document.createElement('span');
                        arrow.className = 'kpi-arrow';
                        arrow.textContent = porcentaje >= 0 ? '↑' : '↓';
                        
                        const percentage = document.createElement('span');
                        percentage.textContent = Math.abs(porcentaje).toFixed(1) + '%';
                        
                        const subtext = document.createElement('span');
                        subtext.className = 'kpi-subtext';
                        subtext.textContent = 'VS año pasado';
                        
                        kpiComparison.appendChild(arrow);
                        kpiComparison.appendChild(percentage);
                        kpiComparison.appendChild(subtext);
                        
                        kpiCard.appendChild(kpiValue);
                        kpiCard.appendChild(kpiComparison);
                        
                        valueDiv.appendChild(kpiCard);
                    }
                }
                // ============================================
                // RENDERIZAR TABLA CON BREAKDOWN Y PORCENTAJES
                // ============================================
                else if (data.tipo === 'tabla' && Array.isArray(data.resultado)) {
                    // Verificar si tiene columna de porcentaje para breakdown
                    const tieneBreakdown = data.resultado.length > 0 && 
                                          ('Porcentaje' in data.resultado[0] || 'porcentaje' in data.resultado[0]);
                    
                    const table = document.createElement('table');
                    table.className = tieneBreakdown ? 'breakdown-table' : 'table-result';
                    
                    if (data.resultado.length > 0) {
                        // Si NO es breakdown, usar tabla normal con header
                        if (!tieneBreakdown) {
                            const thead = document.createElement('thead');
                            const headerRow = document.createElement('tr');
                            Object.keys(data.resultado[0]).forEach(key => {
                                const th = document.createElement('th');
                                th.textContent = key.replace(/_/g, ' ').toUpperCase();
                                headerRow.appendChild(th);
                            });
                            thead.appendChild(headerRow);
                            table.appendChild(thead);
                        }
                        
                        const tbody = document.createElement('tbody');
                        data.resultado.forEach(row => {
                            const tr = document.createElement('tr');
                            
                            if (tieneBreakdown) {
                                // Formato breakdown con barra visual
                                const tdNombre = document.createElement('td');
                                tdNombre.style.backgroundColor = 'white';
                                tdNombre.style.color = '#000';
                                tdNombre.style.fontWeight = '600';
                                
                                const nombre = row.Grupo || row.Condicion || row.grupo || row.condicion || '';
                                const porcentaje = row.Porcentaje || row.porcentaje || 0;
                                
                                tdNombre.innerHTML = `
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <span>${nombre}</span>
                                        <span class="breakdown-percentage">${porcentaje}%</span>
                                    </div>
                                    <div class="breakdown-bar" style="width: ${Math.min(porcentaje, 100)}%;"></div>
                                `;
                                tr.appendChild(tdNombre);
                                
                                const tdVenta = document.createElement('td');
                                tdVenta.style.backgroundColor = 'white';
                                tdVenta.style.color = '#000';
                                tdVenta.style.textAlign = 'right';
                                tdVenta.style.fontWeight = '600';
                                tdVenta.textContent = '$' + (row.Venta || row.venta || 0).toLocaleString('es-MX');
                                tr.appendChild(tdVenta);
                            } else {
                                // Tabla normal - FORZAR VISIBILIDAD
                                Object.values(row).forEach((value, idx) => {
                                    const td = document.createElement('td');
                                    // FORZAR ESTILOS INLINE CON !important
                                    td.setAttribute('style', 'background-color: white !important; color: #000 !important; padding: 12px !important; font-size: 14px !important;');
                                    
                                    // Formatear valores
                                    if (typeof value === 'number') {
                                        if (value > 1000) {
                                            td.textContent = value.toLocaleString('es-MX', {
                                                minimumFractionDigits: 0,
                                                maximumFractionDigits: 2
                                            });
                                        } else {
                                            td.textContent = value.toString();
                                        }
                                    } else if (value === null || value === undefined) {
                                        td.textContent = '';
                                    } else {
                                        td.textContent = String(value);
                                    }
                                    tr.appendChild(td);
                                });
                            }
                            tbody.appendChild(tr);
                        });
                        table.appendChild(tbody);
                    }
                    
                    valueDiv.appendChild(table);
                    
                    // Agregar gráfica si es apropiado (solo para tablas no-breakdown)
                    if (!tieneBreakdown && deberiaGenerarGrafica(metricaId, data.resultado)) {
                        const chartContainer = document.createElement('div');
                        chartContainer.style.marginTop = '20px';
                        chartContainer.style.position = 'relative';
                        chartContainer.style.height = '250px';
                        
                        const canvas = document.createElement('canvas');
                        canvas.id = `chart-${metricaId}`;
                        chartContainer.appendChild(canvas);
                        valueDiv.appendChild(chartContainer);
                        
                        setTimeout(() => generarGrafica(metricaId, data), 100);
                    }
                }
                // ============================================
                // VALOR ESCALAR
                // ============================================
                else {
                    const valor = data.valor !== undefined ? data.valor : data.resultado;
                    const formato = data.formato || {};
                    
                    let valorFormateado = valor;
                    
                    if (typeof valor === 'number') {
                        valorFormateado = valor.toLocaleString('es-MX', {
                            minimumFractionDigits: formato.decimales || 0,
                            maximumFractionDigits: formato.decimales || 0
                        });
                    }
                    
                    valueDiv.textContent = `${formato.prefijo || ''}${valorFormateado}${formato.sufijo || ''}`;
                }
                
                metricDiv.appendChild(nameDiv);
                metricDiv.appendChild(valueDiv);
                
                // Limpiar loading y agregar métrica
                if (container.querySelector('.metric-loading')) {
                    container.innerHTML = '';
                }
                container.appendChild(metricDiv);
                
            } catch (error) {
                console.error(`Error cargando ${metricaId}:`, error);
                
                const metricDiv = document.createElement('div');
                metricDiv.className = 'metric';
                metricDiv.innerHTML = `
                    <div class="metric-name">${metricaId}</div>
                    <div class="metric-error">❌ ${error.message}</div>
                `;
                
                if (container.querySelector('.metric-loading')) {
                    container.innerHTML = '';
                }
                container.appendChild(metricDiv);
            }
        }
        
        function limpiarResultados() {
            const container = document.getElementById(`metricas-${sistemaActual.toLowerCase()}`);
            container.innerHTML = '';
            mostrarStatus(`Métricas de ${sistemaActual} limpiadas`, 'info');
        }
        
        // Determinar si una métrica debe mostrar gráfica
        function deberiaGenerarGrafica(metricaId, datos) {
            // Solo generar gráficas para métricas específicas con datos apropiados
            if (!datos || datos.length === 0 || datos.length > 20) return false;
            
            const metricasConGrafica = [
                'distribucion', 'por_departamento', 'por_familia', 'por_vendedor',
                'por_mes', 'top_', 'salarios', 'empleados', 'gastos', 'antigüedad'
            ];
            
            return metricasConGrafica.some(keyword => metricaId.includes(keyword));
        }
        
        // Generar gráfica con Chart.js
        function generarGrafica(metricaId, data) {
            const canvas = document.getElementById(`chart-${metricaId}`);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const resultado = data.resultado;
            
            // Determinar labels y datos
            const keys = Object.keys(resultado[0]);
            const labelKey = keys[0]; // Primera columna como label
            const valueKey = keys.find(k => typeof resultado[0][k] === 'number') || keys[1];
            
            const labels = resultado.map(row => row[labelKey]);
            const valores = resultado.map(row => row[valueKey]);
            
            // Elegir tipo de gráfica
            let tipoGrafica = 'bar';
            if (metricaId.includes('por_mes') || metricaId.includes('antigüedad')) {
                tipoGrafica = 'line';
            } else if (metricaId.includes('distribucion')) {
                tipoGrafica = 'pie';
            }
            
            // Colores vibrantes
            const colores = [
                'rgba(102, 126, 234, 0.8)',
                'rgba(118, 75, 162, 0.8)',
                'rgba(240, 147, 251, 0.8)',
                'rgba(254, 175, 67, 0.8)',
                'rgba(255, 107, 107, 0.8)',
                'rgba(72, 219, 251, 0.8)',
                'rgba(89, 98, 117, 0.8)',
                'rgba(255, 195, 113, 0.8)'
            ];
            
            const config = {
                type: tipoGrafica,
                data: {
                    labels: labels,
                    datasets: [{
                        label: valueKey.replace(/_/g, ' ').toUpperCase(),
                        data: valores,
                        backgroundColor: tipoGrafica === 'pie' ? colores : colores[0],
                        borderColor: tipoGrafica === 'line' ? colores[1] : 'transparent',
                        borderWidth: tipoGrafica === 'line' ? 3 : 1,
                        tension: 0.4,
                        fill: tipoGrafica === 'line'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: tipoGrafica === 'pie',
                            position: 'bottom'
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 }
                        }
                    },
                    scales: tipoGrafica !== 'pie' ? {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    if (value >= 1000) {
                                        return '$' + (value / 1000).toFixed(0) + 'k';
                                    }
                                    return value;
                                }
                            }
                        }
                    } : {}
                }
            };
            
            new Chart(ctx, config);
        }
        
        function mostrarStatus(mensaje, tipo = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = mensaje;
            statusDiv.className = `status ${tipo}`;
        }

        // Verificar conexión y cargar lista de métricas al iniciar
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const data = await response.json();
                    mostrarStatus(`✅ Servidor conectado - ${data.metricasCargadas} métricas disponibles`, 'success');
                    await cargarListaMetricas();
                } else {
                    mostrarStatus('⚠️ Servidor no responde correctamente', 'error');
                }
            } catch (error) {
                mostrarStatus('❌ No se puede conectar al servidor (puerto 3000)', 'error');
            }
        });
    </script>
</body>
</html>
