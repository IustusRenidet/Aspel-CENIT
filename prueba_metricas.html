<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Métricas - Aspel CENIT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .systems {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .system-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .system-card:hover {
            transform: translateY(-5px);
        }
        
        .system-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .metric {
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .metric-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .metric-value {
            font-size: 1.8em;
            color: #667eea;
            font-weight: 700;
        }
        
        .metric-loading {
            color: #999;
            font-style: italic;
        }
        
        .metric-error {
            color: #e74c3c;
            font-size: 0.9em;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .status {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .table-result {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .table-result th,
        .table-result td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .table-result th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        .table-result tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Prueba de Métricas - Aspel CENIT</h1>
        
        <div class="controls">
            <button onclick="cargarMetricas()" id="btnCargar">
                🔄 Cargar Métricas
            </button>
            <button onclick="limpiarResultados()">
                🗑️ Limpiar
            </button>
            <div id="status" class="status info">
                Listo para probar métricas
            </div>
        </div>
        
        <div class="systems">
            <!-- SAE -->
            <div class="system-card">
                <h2>📊 SAE (Ventas)</h2>
                <div id="metricas-sae"></div>
            </div>
            
            <!-- COI -->
            <div class="system-card">
                <h2>💰 COI (Contabilidad)</h2>
                <div id="metricas-coi"></div>
            </div>
            
            <!-- NOI -->
            <div class="system-card">
                <h2>👥 NOI (Nómina)</h2>
                <div id="metricas-noi"></div>
            </div>
            
            <!-- BANCO -->
            <div class="system-card">
                <h2>🏦 BANCO (Tesorería)</h2>
                <div id="metricas-banco"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        // Métricas a probar por sistema
        const metricasPrueba = {
            SAE: [
                'sae_ventas_mes_actual',
                'sae_clientes_activos',
                'sae_valor_inventario_actual',
                'sae_articulos_activos',
                'sae_saldo_cxc_total'
            ],
            COI: [
                'coi_polizas_anio',
                'coi_cuentas_catalogo',
                'coi_balance_activos',
                'coi_capital_contable'
            ],
            NOI: [
                'noi_registros_nomina',
                'noi_nomina_total',
                'noi_departamentos_activos',
                'noi_promedio_neto'
            ],
            BANCO: [
                'banco_saldo_total',
                'banco_movimientos_mes',
                'banco_ingresos_mes',
                'banco_egresos_mes'
            ]
        };
        
        async function cargarMetricas() {
            const btnCargar = document.getElementById('btnCargar');
            btnCargar.disabled = true;
            btnCargar.innerHTML = '<span class="loader"></span> Cargando...';
            
            mostrarStatus('Conectando al servidor...', 'info');
            
            for (const [sistema, metricas] of Object.entries(metricasPrueba)) {
                const container = document.getElementById(`metricas-${sistema.toLowerCase()}`);
                container.innerHTML = '<div class="metric-loading">⏳ Cargando métricas...</div>';
                
                for (const metricaId of metricas) {
                    await cargarMetrica(sistema, metricaId);
                }
            }
            
            btnCargar.disabled = false;
            btnCargar.innerHTML = '🔄 Recargar Métricas';
            mostrarStatus('✅ Todas las métricas cargadas', 'success');
        }
        
        async function cargarMetrica(sistema, metricaId) {
            const container = document.getElementById(`metricas-${sistema.toLowerCase()}`);
            
            try {
                const response = await fetch(`${API_BASE}/metricas/${sistema}/${metricaId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Crear elemento de métrica
                const metricDiv = document.createElement('div');
                metricDiv.className = 'metric';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'metric-name';
                nameDiv.textContent = data.nombre || metricaId;
                
                const valueDiv = document.createElement('div');
                valueDiv.className = 'metric-value';
                
                if (data.tipo === 'tabla' && Array.isArray(data.resultado)) {
                    // Renderizar tabla
                    const table = document.createElement('table');
                    table.className = 'table-result';
                    
                    if (data.resultado.length > 0) {
                        const thead = document.createElement('thead');
                        const headerRow = document.createElement('tr');
                        Object.keys(data.resultado[0]).forEach(key => {
                            const th = document.createElement('th');
                            th.textContent = key;
                            headerRow.appendChild(th);
                        });
                        thead.appendChild(headerRow);
                        table.appendChild(thead);
                        
                        const tbody = document.createElement('tbody');
                        data.resultado.forEach(row => {
                            const tr = document.createElement('tr');
                            Object.values(row).forEach(value => {
                                const td = document.createElement('td');
                                td.textContent = value;
                                tr.appendChild(td);
                            });
                            tbody.appendChild(tr);
                        });
                        table.appendChild(tbody);
                        
                        valueDiv.appendChild(table);
                    } else {
                        valueDiv.textContent = 'Sin datos';
                        valueDiv.style.fontSize = '1em';
                        valueDiv.style.color = '#999';
                    }
                } else {
                    // Valor escalar
                    const valor = data.valor !== undefined ? data.valor : data.resultado;
                    const formato = data.formato || {};
                    
                    let valorFormateado = valor;
                    
                    if (typeof valor === 'number') {
                        valorFormateado = valor.toLocaleString('es-MX', {
                            minimumFractionDigits: formato.decimales || 0,
                            maximumFractionDigits: formato.decimales || 0
                        });
                    }
                    
                    valueDiv.textContent = `${formato.prefijo || ''}${valorFormateado}${formato.sufijo || ''}`;
                }
                
                metricDiv.appendChild(nameDiv);
                metricDiv.appendChild(valueDiv);
                
                // Limpiar loading y agregar métrica
                if (container.querySelector('.metric-loading')) {
                    container.innerHTML = '';
                }
                container.appendChild(metricDiv);
                
            } catch (error) {
                console.error(`Error cargando ${metricaId}:`, error);
                
                const metricDiv = document.createElement('div');
                metricDiv.className = 'metric';
                metricDiv.innerHTML = `
                    <div class="metric-name">${metricaId}</div>
                    <div class="metric-error">❌ ${error.message}</div>
                `;
                
                if (container.querySelector('.metric-loading')) {
                    container.innerHTML = '';
                }
                container.appendChild(metricDiv);
            }
        }
        
        function limpiarResultados() {
            ['sae', 'coi', 'noi', 'banco'].forEach(sistema => {
                document.getElementById(`metricas-${sistema}`).innerHTML = '';
            });
            mostrarStatus('Resultados limpiados', 'info');
        }
        
        function mostrarStatus(mensaje, tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = mensaje;
            statusDiv.className = `status ${tipo}`;
        }
        
        // Verificar conexión al cargar
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    mostrarStatus('✅ Servidor conectado - Listo para probar', 'success');
                } else {
                    mostrarStatus('⚠️ Servidor no responde correctamente', 'error');
                }
            } catch (error) {
                mostrarStatus('❌ No se puede conectar al servidor (puerto 3000)', 'error');
            }
        });
    </script>
</body>
</html>
