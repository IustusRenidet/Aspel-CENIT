# Métricas Base - Sistema SAE (VERSIÓN CORREGIDA CON TABLAS REALES)
# version: 2.0.0
# sistema: SAE
# descripcion: Métricas usando NOMBRES REALES de tablas Aspel SAE

metadata:
  sistema: SAE
  version: 2.0.0
  generado_en: "2026-01-13"
  descripcion: "Métricas base para Aspel SAE - Usando tablas reales"
  nota: "Tablas mensuales usan sufijos 01-12, usar UNION ALL para consolidar"
  tablas_principales:
    - FACTF01  # Facturas mes 01 (replicar 01-12 para año completo)
    - CLIE01   # Clientes
    - INVE01   # Inventario/Productos
    - VEND01   # Vendedores
    - MINVE01  # Movimientos inventario mes 01
    - PROV01   # Proveedores
    - CUEN_M01 # Cuentas por cobrar mes 01

metricas:
  # ============================================
  # VENTAS - Usando tablas reales
  # ============================================
  
  - id: sae_ventas_mes_actual
    nombre: "Ventas del Mes Actual"
    descripcion: "Total de facturas del mes en curso (usando tabla mensual)"
    categoria: ventas
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    nota: "FACTF01 = facturas del mes 01. Cambiar por mes actual en runtime"
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_ventas_anual_consolidado
    nombre: "Ventas Anuales (Consolidado)"
    descripcion: "Total de ventas sumando todos los meses del año"
    categoria: ventas
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF01 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF02 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF03 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF04 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF05 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF06 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF07 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF08 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF09 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF10 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF11 WHERE STATUS != 'C') +
          (SELECT SUM(CAST(IMPORTE AS DOUBLE)) FROM FACTF12 WHERE STATUS != 'C')
        , 0) as valor
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_ticket_promedio_mes
    nombre: "Ticket Promedio del Mes"
    descripcion: "Importe promedio por factura en el mes actual"
    categoria: ventas
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(AVG(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_conteo_facturas_mes
    nombre: "Cantidad de Facturas del Mes"
    descripcion: "Número de documentos facturados en el mes"
    categoria: ventas
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 0

  # ============================================
  # CLIENTES
  # ============================================

  - id: sae_top_clientes_mes
    nombre: "Top 10 Clientes del Mes"
    descripcion: "Clientes con mayor facturación del mes actual"
    categoria: ventas
    tipo: tabla
    query_duckdb: |
      SELECT 
        cli.CLAVE as clave,
        cli.NOMBRE as nombre,
        COUNT(fac.NUM_FACT) as facturas,
        SUM(CAST(fac.IMPORTE AS DOUBLE)) as total
      FROM FACTF01 fac
      INNER JOIN CLIE01 cli ON fac.CVE_CLPV = cli.CLAVE
      WHERE fac.STATUS != 'C'
        AND fac.FECHA >= date_trunc('month', CURRENT_DATE)
      GROUP BY cli.CLAVE, cli.NOMBRE
      ORDER BY total DESC
      LIMIT 10

  - id: sae_clientes_activos
    nombre: "Clientes Activos"
    descripcion: "Total de clientes con status activo"
    categoria: clientes
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM CLIE01
      WHERE STATUS = 'A'
    formato:
      decimales: 0

  - id: sae_clientes_nuevos_mes
    nombre: "Clientes Nuevos del Mes"
    descripcion: "Clientes dados de alta en el mes actual"
    categoria: clientes
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM CLIE01
      WHERE FECHA_ALTA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 0

  # ============================================
  # INVENTARIOS
  # ============================================

  - id: sae_valor_inventario_actual
    nombre: "Valor Total del Inventario"
    descripcion: "Valor del inventario actual (existencias x costo)"
    categoria: inventarios
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(EXIST * ULT_COSTO AS DOUBLE)), 0) as valor
      FROM INVE01
      WHERE STATUS = 'A'
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_articulos_activos
    nombre: "Artículos Activos"
    descripcion: "Total de productos activos en el catálogo"
    categoria: inventarios
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM INVE01
      WHERE STATUS = 'A'
    formato:
      decimales: 0

  - id: sae_articulos_sin_existencia
    nombre: "Artículos Sin Existencia"
    descripcion: "Productos activos con existencia en cero"
    categoria: inventarios
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM INVE01
      WHERE STATUS = 'A'
        AND CAST(EXIST AS DOUBLE) <= 0
    formato:
      decimales: 0
    alerta:
      tipo: umbral
      nivel_warning: 10
      nivel_critical: 50

  - id: sae_articulos_bajo_minimo
    nombre: "Artículos Bajo Mínimo"
    descripcion: "Productos con existencia menor al mínimo definido"
    categoria: inventarios
    tipo: tabla
    query_duckdb: |
      SELECT 
        CVE_ART as clave,
        DESCR as descripcion,
        CAST(EXIST AS DOUBLE) as existencia,
        CAST(EXIST_MIN AS DOUBLE) as minimo
      FROM INVE01
      WHERE STATUS = 'A'
        AND CAST(EXIST AS DOUBLE) < CAST(EXIST_MIN AS DOUBLE)
        AND CAST(EXIST_MIN AS DOUBLE) > 0
      ORDER BY (CAST(EXIST_MIN AS DOUBLE) - CAST(EXIST AS DOUBLE)) DESC
      LIMIT 20
    alerta:
      tipo: existencia
      mensaje: "Hay artículos bajo mínimo que requieren reorden"

  - id: sae_movimientos_inventario_mes
    nombre: "Movimientos de Inventario del Mes"
    descripcion: "Total de movimientos registrados en el mes"
    categoria: inventarios
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM MINVE01
      WHERE FECHA_APLI >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 0

  # ============================================
  # VENDEDORES
  # ============================================

  - id: sae_top_vendedores_mes
    nombre: "Top 10 Vendedores del Mes"
    descripcion: "Vendedores con mayor facturación del mes"
    categoria: ventas
    tipo: tabla
    query_duckdb: |
      SELECT 
        ven.CVE_VEND as clave,
        ven.NOMBRE as nombre,
        COUNT(fac.NUM_FACT) as facturas,
        SUM(CAST(fac.IMPORTE AS DOUBLE)) as total
      FROM FACTF01 fac
      INNER JOIN VEND01 ven ON fac.CVE_VEND = ven.CVE_VEND
      WHERE fac.STATUS != 'C'
        AND fac.FECHA >= date_trunc('month', CURRENT_DATE)
      GROUP BY ven.CVE_VEND, ven.NOMBRE
      ORDER BY total DESC
      LIMIT 10

  # ============================================
  # COMPRAS Y PROVEEDORES
  # ============================================

  - id: sae_compras_mes
    nombre: "Compras del Mes"
    descripcion: "Total de compras del mes actual"
    categoria: compras
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM COMPC01
      WHERE STATUS != 'C'
        AND FECHA_APLI >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_top_proveedores_mes
    nombre: "Top 10 Proveedores del Mes"
    descripcion: "Proveedores con mayor monto de compras"
    categoria: compras
    tipo: tabla
    query_duckdb: |
      SELECT 
        pro.CVE_PROV as clave,
        pro.NOMBRE as nombre,
        COUNT(com.NUM_COMP) as compras,
        SUM(CAST(com.IMPORTE AS DOUBLE)) as total
      FROM COMPC01 com
      INNER JOIN PROV01 pro ON com.CVE_PROV = pro.CVE_PROV
      WHERE com.STATUS != 'C'
        AND com.FECHA_APLI >= date_trunc('month', CURRENT_DATE)
      GROUP BY pro.CVE_PROV, pro.NOMBRE
      ORDER BY total DESC
      LIMIT 10

  # ============================================
  # CUENTAS POR COBRAR
  # ============================================

  - id: sae_saldo_cxc_total
    nombre: "Saldo Total CxC"
    descripcion: "Saldo pendiente total de cuentas por cobrar"
    categoria: cxc
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(SALDO AS DOUBLE)), 0) as valor
      FROM CUEN_M01
      WHERE CAST(SALDO AS DOUBLE) > 0
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_cxc_vencidas
    nombre: "CxC Vencidas"
    descripcion: "Saldo de cuentas con fecha de vencimiento pasada"
    categoria: cxc
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(SALDO AS DOUBLE)), 0) as valor
      FROM CUEN_M01
      WHERE CAST(SALDO AS DOUBLE) > 0
        AND FECHA_VENC < CURRENT_DATE
    formato:
      decimales: 2
      prefijo: "$"
    alerta:
      tipo: umbral
      nivel_warning: 50000
      nivel_critical: 100000

  - id: sae_clientes_con_saldo
    nombre: "Clientes con Saldo Pendiente"
    descripcion: "Cantidad de clientes con cuentas por cobrar"
    categoria: cxc
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(DISTINCT CVE_CLIE) as valor
      FROM CUEN_M01
      WHERE CAST(SALDO AS DOUBLE) > 0
    formato:
      decimales: 0

  # ============================================
  # ANÁLISIS TEMPORAL
  # ============================================

  - id: sae_ventas_por_mes
    nombre: "Ventas por Mes (Último Año)"
    descripcion: "Serie temporal de ventas mensuales"
    categoria: ventas
    tipo: serie
    unidad: moneda
    query_duckdb: |
      SELECT 
        1 as mes, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) as valor FROM FACTF01 WHERE STATUS != 'C'
      UNION ALL
      SELECT 2, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF02 WHERE STATUS != 'C'
      UNION ALL
      SELECT 3, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF03 WHERE STATUS != 'C'
      UNION ALL
      SELECT 4, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF04 WHERE STATUS != 'C'
      UNION ALL
      SELECT 5, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF05 WHERE STATUS != 'C'
      UNION ALL
      SELECT 6, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF06 WHERE STATUS != 'C'
      UNION ALL
      SELECT 7, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF07 WHERE STATUS != 'C'
      UNION ALL
      SELECT 8, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF08 WHERE STATUS != 'C'
      UNION ALL
      SELECT 9, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF09 WHERE STATUS != 'C'
      UNION ALL
      SELECT 10, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF10 WHERE STATUS != 'C'
      UNION ALL
      SELECT 11, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF11 WHERE STATUS != 'C'
      UNION ALL
      SELECT 12, COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) FROM FACTF12 WHERE STATUS != 'C'
      ORDER BY mes
    formato:
      decimales: 0
    visual:
      tipo: linea
      color: "#10B981"

  - id: sae_top_productos_vendidos
    nombre: "Top 20 Productos Más Vendidos"
    descripcion: "Artículos con mayor volumen de ventas"
    categoria: inventarios
    tipo: tabla
    query_duckdb: |
      SELECT 
        inv.CVE_ART as codigo,
        inv.DESCR as producto,
        COUNT(*) as veces_vendido,
        SUM(CAST(inv.EXIST AS DOUBLE)) as unidades
      FROM INVE01 inv
      WHERE inv.STATUS = 'A'
      GROUP BY inv.CVE_ART, inv.DESCR
      ORDER BY veces_vendido DESC
      LIMIT 20

  - id: sae_margen_utilidad_bruta
    nombre: "Margen de Utilidad Bruta"
    descripcion: "Diferencia entre precio y costo promedio"
    categoria: rentabilidad
    tipo: escalar
    unidad: porcentaje
    query_duckdb: |
      SELECT 
        CASE 
          WHEN SUM(CAST(PRECIO AS DOUBLE)) > 0 THEN
            ((SUM(CAST(PRECIO AS DOUBLE)) - SUM(CAST(ULT_COSTO AS DOUBLE))) / SUM(CAST(PRECIO AS DOUBLE))) * 100
          ELSE 0
        END as valor
      FROM INVE01
      WHERE STATUS = 'A' AND CAST(PRECIO AS DOUBLE) > 0
    formato:
      decimales: 2
      sufijo: "%"

  - id: sae_cxc_dias_promedio
    nombre: "Días Promedio de Cobro"
    descripcion: "Antigüedad promedio de cuentas por cobrar"
    categoria: cxc
    tipo: escalar
    unidad: dias
    query_duckdb: |
      SELECT 
        COALESCE(AVG(CAST(julianday(CURRENT_DATE) - julianday(FECHA_VENC) AS DOUBLE)), 0) as valor
      FROM CUEN_M01
      WHERE CAST(SALDO AS DOUBLE) > 0
    formato:
      decimales: 0
      sufijo: " días"

  - id: sae_rotacion_inventario
    nombre: "Índice de Rotación de Inventario"
    descripcion: "Productos con movimiento en últimos 30 días"
    categoria: inventarios
    tipo: escalar
    unidad: porcentaje
    query_duckdb: |
      SELECT 
        CASE 
          WHEN COUNT(DISTINCT inv.CVE_ART) > 0 THEN
            (COUNT(DISTINCT mov.CVE_ART) * 100.0 / COUNT(DISTINCT inv.CVE_ART))
          ELSE 0
        END as valor
      FROM INVE01 inv
      LEFT JOIN MINVE01 mov ON inv.CVE_ART = mov.CVE_ART 
        AND mov.FECHA_APLI >= date('now', '-30 days')
      WHERE inv.STATUS = 'A'
    formato:
      decimales: 1
      sufijo: "%"

  - id: sae_clientes_sin_compras_90dias
    nombre: "Clientes Inactivos (90+ días)"
    descripcion: "Clientes sin compras en los últimos 90 días"
    categoria: clientes
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(DISTINCT cli.CLAVE) as valor
      FROM CLIE01 cli
      WHERE cli.STATUS = 'A'
        AND NOT EXISTS (
          SELECT 1 FROM FACTF01 fac 
          WHERE fac.CVE_CLPV = cli.CLAVE 
            AND fac.STATUS != 'C'
            AND fac.FECHA >= date('now', '-90 days')
        )
    formato:
      decimales: 0
    alerta:
      tipo: umbral
      nivel_warning: 50

  # ============================================
  # ANÁLISIS DE PRODUCTOS Y RENTABILIDAD
  # ============================================

  - id: sae_productos_mas_rentables
    nombre: "Top 20 Productos Más Rentables"
    descripcion: "Productos con mayor margen de utilidad"
    categoria: rentabilidad
    tipo: tabla
    query_duckdb: |
      SELECT 
        inv.CVE_ART as codigo,
        inv.DESCR as producto,
        CAST(inv.PRECIO AS DOUBLE) as precio,
        CAST(inv.ULT_COSTO AS DOUBLE) as costo,
        (CAST(inv.PRECIO AS DOUBLE) - CAST(inv.ULT_COSTO AS DOUBLE)) as margen,
        CASE 
          WHEN CAST(inv.PRECIO AS DOUBLE) > 0 THEN
            ((CAST(inv.PRECIO AS DOUBLE) - CAST(inv.ULT_COSTO AS DOUBLE)) / CAST(inv.PRECIO AS DOUBLE)) * 100
          ELSE 0
        END as margen_porcentaje
      FROM INVE01 inv
      WHERE inv.STATUS = 'A'
        AND CAST(inv.PRECIO AS DOUBLE) > 0
        AND CAST(inv.ULT_COSTO AS DOUBLE) > 0
      ORDER BY margen DESC
      LIMIT 20

  - id: sae_ventas_por_familia
    nombre: "Ventas por Familia de Productos"
    descripcion: "Distribución de ventas por familia/línea"
    categoria: ventas
    tipo: tabla
    query_duckdb: |
      SELECT 
        inv.FAMILIA as familia,
        COUNT(DISTINCT inv.CVE_ART) as productos,
        SUM(CAST(inv.EXIST AS DOUBLE)) as existencia_total,
        SUM(CAST(inv.EXIST AS DOUBLE) * CAST(inv.PRECIO AS DOUBLE)) as valor_inventario
      FROM INVE01 inv
      WHERE inv.STATUS = 'A'
      GROUP BY inv.FAMILIA
      ORDER BY valor_inventario DESC
      LIMIT 15

  - id: sae_comparativo_ventas_anio_anterior
    nombre: "Comparativo vs Año Anterior"
    descripcion: "Crecimiento de ventas respecto al año pasado"
    categoria: ventas
    tipo: escalar
    unidad: porcentaje
    query_duckdb: |
      WITH ventas_actuales AS (
        SELECT SUM(CAST(IMPORTE AS DOUBLE)) as total 
        FROM FACTF01 
        WHERE STATUS != 'C' 
          AND FECHA >= date('now', 'start of year')
      ),
      ventas_anteriores AS (
        SELECT SUM(CAST(IMPORTE AS DOUBLE)) as total 
        FROM FACTF01 
        WHERE STATUS != 'C' 
          AND FECHA >= date('now', '-1 year', 'start of year')
          AND FECHA < date('now', 'start of year')
      )
      SELECT 
        CASE 
          WHEN va.total > 0 THEN
            ((vac.total - va.total) / va.total) * 100
          ELSE 0
        END as valor
      FROM ventas_actuales vac, ventas_anteriores va
    formato:
      decimales: 1
      sufijo: "%"

  - id: sae_tasa_devolucion
    nombre: "Tasa de Devoluciones"
    descripcion: "Porcentaje de facturas con devoluciones"
    categoria: calidad
    tipo: escalar
    unidad: porcentaje
    query_duckdb: |
      WITH total_facturas AS (
        SELECT COUNT(*) as total FROM FACTF01 WHERE STATUS != 'C'
      ),
      facturas_devolucion AS (
        SELECT COUNT(DISTINCT NUM_FACT) as devueltas 
        FROM FACTF01 
        WHERE STATUS = 'D' OR TIPO_DOC = 'NC'
      )
      SELECT 
        CASE 
          WHEN tf.total > 0 THEN (fd.devueltas * 100.0 / tf.total)
          ELSE 0
        END as valor
      FROM total_facturas tf, facturas_devolucion fd
    formato:
      decimales: 2
      sufijo: "%"
    alerta:
      tipo: umbral
      nivel_warning: 5
      nivel_critical: 10

  - id: sae_pedidos_pendientes
    nombre: "Pedidos Pendientes de Surtir"
    descripcion: "Cantidad de pedidos sin completar"
    categoria: operaciones
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM FACTF01
      WHERE STATUS = 'P'
        AND TIPO_DOC = 'PE'
    formato:
      decimales: 0
    alerta:
      tipo: umbral
      nivel_warning: 20
      nivel_critical: 50

  - id: sae_ticket_promedio_anual
    nombre: "Ticket Promedio Anual"
    descripcion: "Importe promedio por factura en el año"
    categoria: ventas
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(
          SUM(CAST(IMPORTE AS DOUBLE)) / NULLIF(COUNT(*), 0)
        , 0) as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date('now', 'start of year')
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_clientes_top_crecimiento
    nombre: "Clientes con Mayor Crecimiento"
    descripcion: "Top 10 clientes que más aumentaron sus compras"
    categoria: clientes
    tipo: tabla
    query_duckdb: |
      WITH ventas_actuales AS (
        SELECT 
          fac.CVE_CLPV as cliente,
          SUM(CAST(fac.IMPORTE AS DOUBLE)) as total_actual
        FROM FACTF01 fac
        WHERE fac.STATUS != 'C'
          AND fac.FECHA >= date('now', '-30 days')
        GROUP BY fac.CVE_CLPV
      ),
      ventas_anteriores AS (
        SELECT 
          fac.CVE_CLPV as cliente,
          SUM(CAST(fac.IMPORTE AS DOUBLE)) as total_anterior
        FROM FACTF01 fac
        WHERE fac.STATUS != 'C'
          AND fac.FECHA >= date('now', '-60 days')
          AND fac.FECHA < date('now', '-30 days')
        GROUP BY fac.CVE_CLPV
      )
      SELECT 
        cli.NOMBRE as nombre,
        vac.total_actual as compras_recientes,
        COALESCE(van.total_anterior, 0) as compras_anteriores,
        (vac.total_actual - COALESCE(van.total_anterior, 0)) as crecimiento
      FROM ventas_actuales vac
      LEFT JOIN ventas_anteriores van ON vac.cliente = van.cliente
      INNER JOIN CLIE01 cli ON vac.cliente = cli.CLAVE
      WHERE vac.total_actual > COALESCE(van.total_anterior, 0)
      ORDER BY crecimiento DESC
      LIMIT 10

  - id: sae_descuentos_otorgados
    nombre: "Descuentos Totales Otorgados"
    descripcion: "Suma de descuentos aplicados en el mes"
    categoria: ventas
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(DESCUENTO AS DOUBLE)), 0) as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: sae_porcentaje_descuento_promedio
    nombre: "Porcentaje de Descuento Promedio"
    descripcion: "Descuento promedio aplicado sobre ventas"
    categoria: ventas
    tipo: escalar
    unidad: porcentaje
    query_duckdb: |
      SELECT 
        CASE 
          WHEN SUM(CAST(IMPORTE AS DOUBLE)) > 0 THEN
            (SUM(CAST(DESCUENTO AS DOUBLE)) / SUM(CAST(IMPORTE AS DOUBLE))) * 100
          ELSE 0
        END as valor
      FROM FACTF01
      WHERE STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      sufijo: "%"

  - id: sae_productos_baja_rotacion
    nombre: "Productos de Baja Rotación"
    descripcion: "Artículos sin movimiento en 90+ días"
    categoria: inventarios
    tipo: tabla
    query_duckdb: |
      SELECT 
        inv.CVE_ART as codigo,
        inv.DESCR as producto,
        CAST(inv.EXIST AS DOUBLE) as existencia,
        CAST(inv.EXIST AS DOUBLE) * CAST(inv.ULT_COSTO AS DOUBLE) as valor_inmovilizado
      FROM INVE01 inv
      WHERE inv.STATUS = 'A'
        AND CAST(inv.EXIST AS DOUBLE) > 0
        AND NOT EXISTS (
          SELECT 1 FROM MINVE01 mov 
          WHERE mov.CVE_ART = inv.CVE_ART 
            AND mov.FECHA_APLI >= date('now', '-90 days')
        )
      ORDER BY valor_inmovilizado DESC
      LIMIT 20

  - id: sae_ventas_por_vendedor
    nombre: "Ventas por Vendedor (Mes)"
    descripcion: "Distribución de ventas entre vendedores"
    categoria: ventas
    tipo: tabla
    query_duckdb: |
      SELECT 
        ven.CVE_VEND as codigo,
        ven.NOMBRE as vendedor,
        COUNT(fac.NUM_FACT) as facturas,
        SUM(CAST(fac.IMPORTE AS DOUBLE)) as total,
        AVG(CAST(fac.IMPORTE AS DOUBLE)) as ticket_promedio
      FROM FACTF01 fac
      INNER JOIN VEND01 ven ON fac.CVE_VEND = ven.CVE_VEND
      WHERE fac.STATUS != 'C'
        AND fac.FECHA >= date_trunc('month', CURRENT_DATE)
      GROUP BY ven.CVE_VEND, ven.NOMBRE
      ORDER BY total DESC

  - id: sae_eficiencia_vendedores
    nombre: "Índice de Eficiencia de Vendedores"
    descripcion: "Ventas por vendedor vs objetivo"
    categoria: ventas
    tipo: tabla
    query_duckdb: |
      SELECT 
        ven.CVE_VEND as codigo,
        ven.NOMBRE as vendedor,
        SUM(CAST(fac.IMPORTE AS DOUBLE)) as ventas_reales,
        CAST(ven.OBJETIVO AS DOUBLE) as objetivo,
        CASE 
          WHEN CAST(ven.OBJETIVO AS DOUBLE) > 0 THEN
            (SUM(CAST(fac.IMPORTE AS DOUBLE)) / CAST(ven.OBJETIVO AS DOUBLE)) * 100
          ELSE 0
        END as porcentaje_objetivo
      FROM FACTF01 fac
      INNER JOIN VEND01 ven ON fac.CVE_VEND = ven.CVE_VEND
      WHERE fac.STATUS != 'C'
        AND fac.FECHA >= date_trunc('month', CURRENT_DATE)
      GROUP BY ven.CVE_VEND, ven.NOMBRE, ven.OBJETIVO
      ORDER BY porcentaje_objetivo DESC

  - id: sae_tiempo_promedio_cobro
    nombre: "Tiempo Promedio de Cobro"
    descripcion: "Días entre facturación y cobro"
    categoria: cxc
    tipo: escalar
    unidad: dias
    query_duckdb: |
      SELECT 
        COALESCE(
          AVG(CAST(julianday(FECHA_PAGO) - julianday(FECHA_EMISION) AS DOUBLE))
        , 0) as valor
      FROM CUEN_M01
      WHERE FECHA_PAGO IS NOT NULL
        AND FECHA_EMISION >= date('now', '-90 days')
    formato:
      decimales: 0
      sufijo: " días"

  - id: sae_productos_precio_desactualizado
    nombre: "Productos con Precio Sin Actualizar"
    descripcion: "Artículos con precio sin cambios en 180+ días"
    categoria: inventarios
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM INVE01
      WHERE STATUS = 'A'
        AND (FECHA_ULT_PRECIO IS NULL 
          OR FECHA_ULT_PRECIO < date('now', '-180 days'))
    formato:
      decimales: 0
    alerta:
      tipo: umbral
      nivel_warning: 50
      nivel_critical: 100

  - id: sae_mermas_inventario
    nombre: "Valor de Mermas y Ajustes"
    descripcion: "Valor de movimientos de ajuste negativo"
    categoria: inventarios
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(
          SUM(CAST(CANTIDAD AS DOUBLE) * CAST(COSTO AS DOUBLE))
        , 0) as valor
      FROM MINVE01
      WHERE TIPO_MOV IN ('AJ', 'ME')
        AND CAST(CANTIDAD AS DOUBLE) < 0
        AND FECHA_APLI >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"
    alerta:
      tipo: umbral
      nivel_warning: 10000
      nivel_critical: 50000


