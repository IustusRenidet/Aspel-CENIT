# Métricas Base - Sistema BANCO
# version: 2.0.0
# sistema: BANCO

metadata:
  sistema: BANCO
  version: 2.0.0
  descripcion: "Métricas base para Aspel BANCO - Usando tablas reales"
  tablas_principales:
    - CTAS   # Catálogo de cuentas bancarias
    - MOVS01 # Movimientos bancarios

metricas:
  - id: banco_saldo_total
    nombre: "Saldo Total en Bancos"
    descripcion: "Suma de saldos de todas las cuentas bancarias"
    categoria: tesoreria
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(SALDO_ACT AS DOUBLE)), 0) as valor
      FROM CTAS
      WHERE STATUS = 'A'
    formato:
      decimales: 2
      prefijo: "$"

  - id: banco_movimientos_mes
    nombre: "Movimientos del Mes"
    descripcion: "Total de transacciones bancarias del mes"
    categoria: tesoreria
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM MOVS01
      WHERE FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 0

  - id: banco_saldo_por_cuenta
    nombre: "Saldo por Cuenta Bancaria"
    descripcion: "Detalle de saldos de cada cuenta"
    categoria: tesoreria
    tipo: tabla
    query_duckdb: |
      SELECT 
        NUM_CTA as cuenta,
        NOMBRE as nombre,
        CAST(SALDO_ACT AS DOUBLE) as saldo
      FROM CTAS
      WHERE STATUS = 'A'
      ORDER BY saldo DESC

  - id: banco_ingresos_mes
    nombre: "Ingresos del Mes"
    descripcion: "Total de movimientos de ingreso"
    categoria: tesoreria
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM MOVS01
      WHERE TIPO_MOV = 'I'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: banco_egresos_mes
    nombre: "Egresos del Mes"
    descripcion: "Total de movimientos de egreso"
    categoria: tesoreria
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(SUM(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM MOVS01
      WHERE TIPO_MOV = 'E'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: banco_flujo_neto_mes
    nombre: "Flujo Neto del Mes"
    descripcion: "Diferencia entre ingresos y egresos"
    categoria: tesoreria
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(
          SUM(CASE WHEN TIPO_MOV = 'I' THEN CAST(IMPORTE AS DOUBLE) ELSE 0 END) -
          SUM(CASE WHEN TIPO_MOV = 'E' THEN CAST(IMPORTE AS DOUBLE) ELSE 0 END)
        , 0) as valor
      FROM MOVS01
      WHERE FECHA >= date_trunc('month', CURRENT_DATE)
    formato:
      decimales: 2
      prefijo: "$"

  - id: banco_cheques_pendientes
    nombre: "Cheques Pendientes"
    descripcion: "Movimientos no conciliados"
    categoria: tesoreria
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT 
        COUNT(*) as valor
      FROM MOVS01
      WHERE STATUS = 'P'
    formato:
      decimales: 0

  - id: banco_cuenta_mayor_saldo
    nombre: "Cuenta con Mayor Saldo"
    descripcion: "Identificar cuenta con más recursos"
    categoria: tesoreria
    tipo: tabla
    query_duckdb: |
      SELECT 
        NUM_CTA as cuenta,
        NOMBRE as nombre,
        CAST(SALDO_ACT AS DOUBLE) as saldo
      FROM CTAS
      WHERE STATUS = 'A'
      ORDER BY saldo DESC
      LIMIT 1

  - id: banco_promedio_transacciones
    nombre: "Promedio de Transacciones"
    descripcion: "Importe promedio por movimiento"
    categoria: tesoreria
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT 
        COALESCE(AVG(CAST(IMPORTE AS DOUBLE)), 0) as valor
      FROM MOVS01
      WHERE FECHA >= date('now', '-30 days')
    formato:
      decimales: 2
      prefijo: "$"

