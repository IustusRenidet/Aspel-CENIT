# Metricas Base - Sistema BANCO
# version: 1.0.0
# sistema: BANCO
# descripcion: Metricas fundamentales para bancos y conciliacion

metadata:
  sistema: BANCO
  version: 1.0.0
  generado_en: "2026-01-12"
  descripcion: "Metricas base para Aspel BANCO - Operaciones bancarias"
  tablas_principales:
    - CTAS
    - MOVS01
    - BENEF
    - CTECONC

metricas:
  - id: ban_saldo_total
    nombre: "Saldo Total Disponibilidad"
    descripcion: "Suma de saldos de todas las cuentas bancarias activas"
    categoria: saldos
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT
        COALESCE(SUM(SALDO), 0) as valor
      FROM CTAS
      WHERE STATUS = 'A'
        AND TIPO_CTA = 'Cheques'
    formato:
      decimales: 2
      prefijo: "$"

  - id: ban_ingresos_mes
    nombre: "Ingresos del Mes"
    descripcion: "Total de abonos del mes en cuentas bancarias"
    categoria: movimientos
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT
        COALESCE(SUM(MONTO), 0) as valor
      FROM MOVS01
      WHERE TIPO_MOV = 'Abono'
        AND STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
        AND FECHA < date_trunc('month', CURRENT_DATE) + INTERVAL '1 month'
    formato:
      decimales: 2
      prefijo: "$"

  - id: ban_egresos_mes
    nombre: "Egresos del Mes"
    descripcion: "Total de cargos del mes en cuentas bancarias"
    categoria: movimientos
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT
        COALESCE(SUM(MONTO), 0) as valor
      FROM MOVS01
      WHERE TIPO_MOV = 'Cargo'
        AND STATUS != 'C'
        AND FECHA >= date_trunc('month', CURRENT_DATE)
        AND FECHA < date_trunc('month', CURRENT_DATE) + INTERVAL '1 month'
    formato:
      decimales: 2
      prefijo: "$"

  - id: ban_flujo_diario
    nombre: "Flujo de Efectivo Diario"
    descripcion: "Flujo diario de movimientos (abonos y cargos)"
    categoria: movimientos
    tipo: serie
    unidad: moneda
    query_duckdb: |
      SELECT
        FECHA as fecha,
        SUM(MONTO) as valor
      FROM MOVS01
      WHERE STATUS != 'C'
      GROUP BY FECHA
      ORDER BY FECHA
    formato:
      decimales: 2
      prefijo: "$"
    visual:
      tipo: linea
      color: "#0E7C86"

