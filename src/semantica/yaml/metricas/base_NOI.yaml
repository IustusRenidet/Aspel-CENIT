# Metricas Base - Sistema NOI
# version: 1.0.0
# sistema: NOI
# descripcion: Metricas fundamentales para nomina y recursos humanos

metadata:
  sistema: NOI
  version: 1.0.0
  generado_en: "2026-01-12"
  descripcion: "Metricas base para Aspel NOI - Nomina y RRHH"
  tablas_principales:
    - NWNOMINAS01
    - TRAB01

metricas:
  - id: noi_nomina_total_periodo
    nombre: "Nomina Total (Periodo)"
    descripcion: "Total de percepciones pagadas en el periodo actual"
    categoria: nomina
    tipo: escalar
    unidad: moneda
    query_duckdb: |
      SELECT
        COALESCE(SUM(PERCEPCIONES), 0) as valor
      FROM NWNOMINAS01
      WHERE STATUS != 'C'
        AND FECHA_PAGO >= date_trunc('month', CURRENT_DATE)
        AND FECHA_PAGO < date_trunc('month', CURRENT_DATE) + INTERVAL '1 month'
    formato:
      decimales: 2
      prefijo: "$"

  - id: noi_empleados_activos
    nombre: "Empleados Activos"
    descripcion: "Conteo de empleados activos en el padron"
    categoria: plantilla
    tipo: escalar
    unidad: cantidad
    query_duckdb: |
      SELECT
        COUNT(*) as valor
      FROM TRAB01
      WHERE STATUS = 'A'
    formato:
      decimales: 0

  - id: noi_nomina_por_departamento
    nombre: "Nomina por Departamento"
    descripcion: "Total de nomina agrupada por departamento"
    categoria: nomina
    tipo: tabla
    query_duckdb: |
      SELECT
        NUM_DEPTO as departamento,
        SUM(TOTAL) as valor
      FROM NWNOMINAS01
      WHERE STATUS != 'C'
      GROUP BY NUM_DEPTO
      ORDER BY valor DESC
    formato:
      columnas:
        - nombre: departamento
          tipo: texto
        - nombre: valor
          tipo: moneda
          decimales: 2

